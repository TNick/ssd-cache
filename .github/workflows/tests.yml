name: Tests

on:
  push:
  pull_request:

jobs:
  core-tests:
    name: Core tests (Windows, user-mode)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Initialize the MSVC x64 toolchain so cl.exe/link.exe and the Windows
      # SDK are on PATH. This is more robust than relying on CMake's Visual
      # Studio generator auto-detection, which varies across runner images.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # The `ci` preset uses the Ninja generator and builds the portable core,
      # the Windows service/tray and the test executable, but skips the WDK
      # minifilter driver (which needs the Windows Driver Kit and a loaded
      # driver to exercise). That is exactly the surface the tests cover.
      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset ci
